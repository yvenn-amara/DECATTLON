
<footer class="site-footer" role="contentinfo">
  <div class="container footer-inner">
    <p class="footer-title">{{ site.title }}</p>
    <p class="footer-meta">{{ site.event.start_date }} &mdash; {{ site.event.location }}</p>
    <p class="footer-contact">
      Contact&nbsp;:
      <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
    </p>
    <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. Site generated with <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>.</p>
  </div>
</footer>
