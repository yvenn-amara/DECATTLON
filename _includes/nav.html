
<nav id="main-nav" class="site-nav" aria-label="Main navigation">
  <ul>
    <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a></li>
    <li><a href="{{ '/program/' | relative_url }}"{% if page.url contains '/program' %} aria-current="page"{% endif %}>Program</a></li>
    <li><a href="{{ '/call-for-posters/' | relative_url }}"{% if page.url contains '/call-for-posters' %} aria-current="page"{% endif %}>Posters</a></li>
    <li><a href="{{ '/venue/' | relative_url }}"{% if page.url contains '/venue' %} aria-current="page"{% endif %}>Venue</a></li>
  </ul>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.querySelector('.nav-toggle');
    var nav = document.getElementById('main-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function () {
      var open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      btn.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    });
  });
</script>
