- name: "Mathilde Mougeot"
  affiliation: "ENS Paris-Saclay / Centre Borelli / ENSIIE"
  title: "Professeure en science des données & Titulaire de la chaire Industrial Data Analytics and Machine Learning"
  photo: https://ens-paris-saclay.fr/sites/default/files/styles/actu_bandeau/public/2021-10/mougeot_mathilde_photo_v2_recadree.jpg
  bio: "Mathilde Mougeot est chercheuse en mathématiques appliquées et science des données. Ses recherches portent sur l'apprentissage statistique (machine learning), la mise au point de modèles prédictifs, l'agrégation de modèles et l'apprentissage par transfert (transfer learning), avec de nombreuses applications concrètes pour les défis industriels."
  website: https://sites.google.com/site/mougeotmathilde/

