- name: "Mathilde Mougeot"
  affiliation: "ENS Paris-Saclay / Centre Borelli / ENSIIE"
  title: "Professor of Data Science & Holder of the Industrial Data Analytics and Machine Learning Chair"
  photo: "assets/img/MathildeMougeot.png"
  bio: "Mathilde is a researcher in applied mathematics and data science. Her work focuses on statistical learning, predictive modelling, model aggregation, and transfer learning, with strong ties to industrial applications."
  website: "https://sites.google.com/site/mougeotmathilde/"

- name: "Shifeng Xie"
  affiliation: "Université Paris Cité"
  title: "PhD student"
  photo: "assets/img/ShifengXie.png"
  bio: "Shifeng is a PhD student in Themis Palpanas's group at Université Paris Cité, after studying engineering at Télécom Paris and Institut Polytechnique de Paris. His research focuses on time series foundation models and agentic systems for forecasting, reasoning, and decision-making."
  website: "https://shifengxie.github.io"

- name: "Tahar Nabil"
  affiliation: "EDF R&D"
  title: "AI Scientist"
  photo: "assets/img/Nabil.png"
  bio: "Tahar holds a PhD from Télécom Paris in signal processing. At EDF R&D, he works on time series foundation models and generative AI for industrial process design."
  website: "https://taharnbl.github.io/"

- name: "Adrien Petralia"
  affiliation: "Mistral AI"
  title: "AI Scientist"
  photo: "assets/img/Petralia.png"
  bio: "Adrien holds a PhD from Université Paris-Cité on deep learning for time series in the energy sector, spanning signal separation, foundation models, and generative modelling for load disaggregation."
  website: "https://adrienpetralia.github.io/"

- name: "Etienne Le Naour"
  affiliation: "EDF R&D"
  title: "AI Scientist"
  photo: "assets/img/LeNaour.png"
  bio: "Etienne holds a PhD from Sorbonne Université, in collaboration with EDF R&D, on neural representation learning for time series. He now builds foundation models for time series with a focus on forecasting and imputation."
  website: "https://etiennelnr.github.io/"

- name: "Raphael Nedellec"
  affiliation: "Decathlon"
  title: "Data Science Manager"
  photo: "assets/img/R_Nedellec.png"
  bio: "Raphael's research focuses on forecasting and calibrated quantile regression using semi-parametric additive models, with widely-used contributions such as the qgam and mgcViz R packages. He now leads data science work at Decathlon."
  website: "https://scholar.google.com/citations?user=GAisXYIAAAAJ&hl=en"

- name: "Roberto Stanzione"
  affiliation: "INRIA (Valda)"
  title: "Post-Doc student"
  photo: ""
  bio: "Roberto completed his PhD at the University of Salerno, working on relaxed functional dependencies, concept drift detection in machine learning systems, and federated learning. He is now a post-doc in the Valda team at Inria."
  website: "https://scholar.google.com/citations?user=bIFPBwMAAAAJ&hl=it"


